<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário Simples</h1>
    <form>
        <table>
            <tr>
                <th><label>Nome Completo</label></th>
                <td><input type="text" name="nomeCompleto" id="nome_completo"></td>
            </tr>
            <tr>
                <th><label>E-mail</label></th>
                <td><input type="email" name="email" id="email"></td>
            </tr>
            <tr>
                <th>Envie a sua Mensagem</th>
                <td><textarea name="mensagem" rows="5" cols="40">Digite sua mensagem aqui</textarea></td>
            </tr>
            <tr>
                <td></td>
                <td><button>Enviar Mensagem</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
